# ---------------------------------------------------------------------------
# "PeerOrgs" - Definition of organizations managing peer nodes
# ---------------------------------------------------------------------------
PeerOrgs:
  # ---------------------------------------------------------------------------
  # Org1
  # ---------------------------------------------------------------------------
  - Name: Org1
    Domain: org1.example.com
    EnableNodeOUs: true
    # ---------------------------------------------------------------------------
    # "Template"
    # ---------------------------------------------------------------------------
    # Allows for the definition of 1 or more hosts that are created sequentially
    # from a template. By default, this looks like "peer%d" from 0 to Count-1.
    #
    # Count:     The number of nodes to create from this template
    # Start:     (Optional) The integer index at which to start numbering. By default, 
    #            this is 0. You may override this to start at a different number.
    # Hostname:  (Optional) The hostname template. By default this is "{{.Prefix}}{{.Index}}"
    #            where both .Prefix and .Index are replaced with the values specified by
    #            this Spec.
    # SANS:      (Optional) Alternate domain names for the node. By default, all nodes will
    #            be able to be reached by "{{.Hostname}}.{{.Domain}}". You may override this
    #            by providing explicit SANS entries.
    # ---------------------------------------------------------------------------
    Template:
      Count: 2
      Start: 0
      Hostname: peer{{.Index}}
      SANS:
        - localhost
        - "*.org1.example.com"
    # ---------------------------------------------------------------------------
    # "Users"
    # ---------------------------------------------------------------------------
    # Count: The number of user accounts _in addition_ to Admin
    # ---------------------------------------------------------------------------
    Users:
      Count: 1

  # ---------------------------------------------------------------------------
  # Org2
  # ---------------------------------------------------------------------------
  - Name: Org2
    Domain: org2.example.com
    EnableNodeOUs: true
    Template:
      Count: 2
      Start: 0
      Hostname: peer{{.Index}}
      SANS:
        - localhost
        - "*.org2.example.com"
    Users:
      Count: 1

  # ---------------------------------------------------------------------------
  # Org3
  # ---------------------------------------------------------------------------
  # Uncomment below to add a third organization (optional)
  # ---------------------------------------------------------------------------
  # - Name: Org3
  #   Domain: org3.example.com
  #   EnableNodeOUs: true
  #   Template:
  #     Count: 1
  #     Start: 0
  #     Hostname: peer
  #     SANS:
  #       - localhost
  #       - "*.org3.example.com"
  #   Users:
  #     Count: 1

# ---------------------------------------------------------------------------
# "OrdererOrgs" - Definition of organizations managing orderer nodes
# ---------------------------------------------------------------------------
OrdererOrgs:
  # ---------------------------------------------------------------------------
  # Orderer
  # ---------------------------------------------------------------------------
  - Name: Orderer
    Domain: example.com
    EnableNodeOUs: true
    # ---------------------------------------------------------------------------
    # "Specs" - See PeerOrgs for complete description
    # ---------------------------------------------------------------------------
    # You may explicitly specify the hosts that you want to be generated.  This is
    # useful when you want to create an orderer org with a specific set of hosts.
    # Uncomment this section to enable the explicit definition of orderer hosts.
    # ---------------------------------------------------------------------------
    Specs:
      - Hostname: orderer
        SANS:
          - localhost
          - "*.example.com"
      # Uncomment to add more orderers if needed (for multi-node consensus)
      # - Hostname: orderer2
      #   SANS:
      #     - localhost
      # - Hostname: orderer3
      #   SANS:
      #     - localhost
